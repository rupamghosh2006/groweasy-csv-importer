<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f544f"/>
      <stop offset="100%" stop-color="#1c332f"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="100%" stop-color="#f2a742"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="240" height="240" rx="52" fill="url(#bg)"/>

  <!-- document / sheet -->
  <g transform="translate(48,44)">
    <rect x="0" y="0" width="92" height="118" rx="12" fill="#f5f1e8"/>
    <!-- folded corner -->
    <path d="M64 0 L92 28 L64 28 Z" fill="#d8cfb8"/>

    <!-- row lines representing spreadsheet data -->
    <rect x="14" y="42" width="64" height="7" rx="3.5" fill="#a9b7b3"/>
    <rect x="14" y="58" width="46" height="7" rx="3.5" fill="#a9b7b3"/>
    <rect x="14" y="74" width="64" height="7" rx="3.5" fill="#294744"/>
    <rect x="14" y="90" width="36" height="7" rx="3.5" fill="#a9b7b3"/>
  </g>

  <!-- arrow showing transformation -->
  <path d="M104 120 L138 120" stroke="#f2a742" stroke-width="8" stroke-linecap="round"/>
  <path d="M126 106 L142 120 L126 134" fill="none" stroke="#f2a742" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CRM card result -->
  <g transform="translate(148,58)">
    <rect x="0" y="0" width="46" height="90" rx="10" fill="#3d6a63"/>
    <circle cx="23" cy="20" r="9" fill="#f5f1e8"/>
    <rect x="8" y="36" width="30" height="5" rx="2.5" fill="#f5f1e8" opacity="0.9"/>
    <rect x="8" y="46" width="22" height="5" rx="2.5" fill="#f5f1e8" opacity="0.7"/>
    <rect x="8" y="64" width="30" height="14" rx="7" fill="#7fd1a0"/>
  </g>

  <!-- AI sparkle -->
  <g transform="translate(168,150)">
    <path d="M14 0 L18 10 L28 14 L18 18 L14 28 L10 18 L0 14 L10 10 Z" fill="url(#spark)"/>
  </g>
  <g transform="translate(184,168) scale(0.55)">
    <path d="M14 0 L18 10 L28 14 L18 18 L14 28 L10 18 L0 14 L10 10 Z" fill="url(#spark)"/>
  </g>
</svg>
