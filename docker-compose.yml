services:
  server:
    build:
      context: ./server
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      BATCH_SIZE: ${BATCH_SIZE:-25}
      CONCURRENCY: ${CONCURRENCY:-2}
      MAX_RETRIES: ${MAX_RETRIES:-2}
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
