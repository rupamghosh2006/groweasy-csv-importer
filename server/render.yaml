services:
  - type: web
    name: groweasy-server
    runtime: node
    repo: https://github.com/rupamghosh2006/groweasy-csv-importer
    rootDir: server
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 18
